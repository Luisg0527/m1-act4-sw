name: deploy-pages

on:
  pull_request:
    branches: [develop, staging, main]
  push:
    branches: [develop, staging, main]

permissions:
  contents: read

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build develop preview
        if: github.ref == 'refs/heads/develop' || github.base_ref == 'develop'
        run: npm run build
        env:
          VITE_PUBLIC_ENVIRONMENT: dev
          VITE_PUBLIC_VERSION: ${{ github.sha }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_PROD_BUDGET: ${{ vars.VITE_PROD_BUDGET }}
          VITE_PROD_FORMAT: ${{ vars.VITE_PROD_FORMAT }}
          VITE_PROD_GROSS: ${{ secrets.VITE_PROD_GROSS }}
          VITE_PROD_DURATION: ${{ vars.VITE_PROD_DURATION }}
          VITE_ENV_NOTE: ${{ secrets.VITE_ENV_NOTE }}

      - name: Build staging site
        if: github.ref == 'refs/heads/staging' || github.base_ref == 'staging'
        run: npm run build
        env:
          VITE_PUBLIC_ENVIRONMENT: staging
          VITE_PUBLIC_VERSION: ${{ github.sha }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_PROD_BUDGET: ${{ vars.VITE_PROD_BUDGET }}
          VITE_PROD_FORMAT: ${{ vars.VITE_PROD_FORMAT }}
          VITE_PROD_GROSS: ${{ secrets.VITE_PROD_GROSS }}
          VITE_PROD_DURATION: ${{ vars.VITE_PROD_DURATION }}
          VITE_ENV_NOTE: ${{ secrets.VITE_ENV_NOTE }}

      - name: Build main site
        if: github.ref == 'refs/heads/main' || github.base_ref == 'main'
        run: npm run build
        env:
          VITE_PUBLIC_ENVIRONMENT: prod
          VITE_PUBLIC_VERSION: ${{ github.sha }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_PROD_BUDGET: ${{ vars.VITE_PROD_BUDGET }}
          VITE_PROD_FORMAT: ${{ vars.VITE_PROD_FORMAT }}
          VITE_PROD_GROSS: ${{ secrets.VITE_PROD_GROSS }}
          VITE_PROD_DURATION: ${{ vars.VITE_PROD_DURATION }}
          VITE_ENV_NOTE: ${{ secrets.VITE_ENV_NOTE }}

      - name: Upload preview artifact for develop
        if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: develop-dist
          path: dist

  deploy-pages:
    if: (github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main') && github.event_name == 'push'
    needs: quality
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          VITE_PUBLIC_ENVIRONMENT: ${{ github.ref == 'refs/heads/main' && 'prod' || 'staging' }}
          VITE_PUBLIC_VERSION: ${{ github.sha }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_PROD_BUDGET: ${{ vars.VITE_PROD_BUDGET }}
          VITE_PROD_FORMAT: ${{ vars.VITE_PROD_FORMAT }}
          VITE_PROD_GROSS: ${{ secrets.VITE_PROD_GROSS }}
          VITE_PROD_DURATION: ${{ vars.VITE_PROD_DURATION }}
          VITE_ENV_NOTE: ${{ secrets.VITE_ENV_NOTE }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

